<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f9d58">

<style>

body{
font-family:Arial;
background:#0f2027;
color:white;
padding:10px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#1f3a44;
padding:15px;
border-radius:10px;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00ffcc;
border:none;
border-radius:6px;
font-weight:bold;
}

.result{
background:white;
color:black;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Digi Payattu</h2>

<div class="card">

<h3>Add Customer</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="amount" placeholder="Received Amount">

<button onclick="saveData()">Save Data</button>

<p id="msg"></p>

</div>


<div class="card">

<h3>Search</h3>

<input id="search" placeholder="Name or Phone">

<button onclick="searchData()">Search</button>

<div id="result"></div>

</div>

</div>

<script>

let db;

let request = indexedDB.open("PayattuDB",1);

request.onupgradeneeded = function(e){

db = e.target.result;

db.createObjectStore("customers",{keyPath:"id",autoIncrement:true});

};

request.onsuccess = function(e){

db = e.target.result;

};



function saveData(){

let tx = db.transaction("customers","readwrite");

let store = tx.objectStore("customers");

store.add({

name:document.getElementById("name").value,

phone:document.getElementById("phone").value,

received:document.getElementById("amount").value,

giveback:0,

date:new Date().toLocaleDateString()

});

msg.innerHTML="Data added";

name.value="";
phone.value="";
amount.value="";

}



function searchData(){

let keyword = document.getElementById("search").value.toLowerCase();

result.innerHTML="";

let tx = db.transaction("customers","readonly");

let store = tx.objectStore("customers");

store.openCursor().onsuccess = function(e){

let cursor = e.target.result;

if(cursor){

let data = cursor.value;

if(

data.name.toLowerCase().includes(keyword) ||

data.phone.includes(keyword)

){

result.innerHTML += `

<div class="result">

${data.name}<br>

${data.phone}<br>

Received: ₹${data.received}<br>

Give Back: ₹${data.giveback}

<button onclick="giveBack(${data.id})">Update Give Back</button>

</div>

`;

}

cursor.continue();

}

};

}



function giveBack(id){

let amount = prompt("Enter Give Back Amount");

if(!amount) return;

let tx = db.transaction("customers","readwrite");

let store = tx.objectStore("customers");

let req = store.get(id);

req.onsuccess = function(){

let data = req.result;

data.giveback = amount;

store.put(data);

alert("Updated");

searchData();

};

}

</script>

</body>
</html>
