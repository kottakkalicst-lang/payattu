```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f2027;
color:white;
padding:10px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#1f3a44;
padding:15px;
border-radius:10px;
margin-top:12px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00ffcc;
border:none;
border-radius:6px;
font-weight:bold;
}

.result-card{
background:white;
color:black;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Digi Payattu</h2>

<div class="card">

<h3>Add Customer</h3>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<input id="amount" placeholder="Received Amount">

<button onclick="saveData()">Save Data</button>

<p id="msg"></p>

</div>

<div class="card">

<h3>Search</h3>

<input id="search" placeholder="Name or Phone">
<button onclick="searchData()">Search</button>

<div id="result"></div>

</div>

</div>

<script>

let db;

let request=indexedDB.open("PayattuDB",1);

request.onupgradeneeded=function(e){

db=e.target.result;

db.createObjectStore("customers",{keyPath:"id",autoIncrement:true});

};

request.onsuccess=function(e){

db=e.target.result;

};



function saveData(){

let name=document.getElementById("name").value;
let address=document.getElementById("address").value;
let phone=document.getElementById("phone").value;
let amount=document.getElementById("amount").value;

let tx=db.transaction("customers","readwrite");

let store=tx.objectStore("customers");

store.add({

name:name,
address:address,
phone:phone,
received:Number(amount),
giveback:0,
date:new Date().toLocaleDateString()

});

document.getElementById("msg").innerHTML="Data Added";

document.getElementById("name").value="";
document.getElementById("address").value="";
document.getElementById("phone").value="";
document.getElementById("amount").value="";

}



function searchData(){

if(!db){
alert("Database loading...");
return;
}

let keyword=document.getElementById("search").value.trim().toLowerCase();

let result=document.getElementById("result");

result.innerHTML="";

let tx=db.transaction("customers","readonly");

let store=tx.objectStore("customers");

store.openCursor().onsuccess=function(e){

let cursor=e.target.result;

if(cursor){

let data=cursor.value;

if(

data.name.toLowerCase().includes(keyword) ||

data.phone.includes(keyword)

){

result.innerHTML+=`

<div class="result-card">

📅 ${data.date}<br>
👤 ${data.name}<br>
📍 ${data.address}<br>
📞 ${data.phone}<br>
💰 Received: ₹${data.received}<br>
💸 Give Back: ₹${data.giveback}

<br><br>

<input id="give_${data.id}" placeholder="Enter give back amount">

<button onclick="updateGiveBack(${data.id})">

Add Give Back

</button>

</div>

`;

}

cursor.continue();

}

};

}



function updateGiveBack(id){

let amount=document.getElementById("give_"+id).value;

if(amount=="" || isNaN(amount)){

alert("Enter valid amount");

return;

}

let tx=db.transaction("customers","readwrite");

let store=tx.objectStore("customers");

let req=store.get(id);

req.onsuccess=function(){

let data=req.result;

data.giveback=Number(data.giveback)+Number(amount);

store.put(data);

alert("Give Back Updated");

searchData();

};

}

</script>

</body>
</html>
