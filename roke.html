<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f9d58">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<script>

if ('serviceWorker' in navigator) {

navigator.serviceWorker.register('service-worker.js');

}

</script>

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
margin:0;
color:white;
background:linear-gradient(-45deg,#11998e,#38ef7d,#0f2027,#2c5364);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

h2{
text-align:center;
font-weight:600;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
padding:15px;
border-radius:15px;
margin-top:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
outline:none;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#00ffcc;
color:black;
font-weight:600;
font-size:15px;
}

button:active{
transform:scale(0.97);
}

#msg{
text-align:center;
margin-top:10px;
font-weight:500;
color:#00ffcc;
}

.result-card{
background:white;
color:black;
padding:12px;
border-radius:12px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>💰 Digi Payattu</h2>

<div class="card">

<h3>Add Customer</h3>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<input id="amount" placeholder="Received Rs">

<button onclick="saveData()">SAVE DATA</button>

<p id="msg"></p>

</div>

<div class="card">

<h3>Search</h3>

<input id="search" placeholder="Name or Phone">
<button onclick="searchData()">SEARCH</button>

<div id="result"></div>

</div>

</div>

<script>

let db;

const request = indexedDB.open("DigiPayattuDB", 1);

request.onupgradeneeded = function(e){
db = e.target.result;
db.createObjectStore("customers", {keyPath:"id", autoIncrement:true});
};

request.onsuccess = function(e){
db = e.target.result;
};

function saveData(){

let tx = db.transaction("customers","readwrite");
let store = tx.objectStore("customers");

store.add({
name:name.value,
address:address.value,
phone:phone.value,
received:amount.value,
giveback:"",
date:new Date().toLocaleDateString()
});

msg.innerHTML="✅ Data added successfully";

name.value=address.value=phone.value=amount.value="";
}

function searchData(){

result.innerHTML="";

let tx = db.transaction("customers","readonly");
let store = tx.objectStore("customers");

store.openCursor().onsuccess = function(e){

let cursor = e.target.result;

if(cursor){

let data = cursor.value;

if(
data.name.toLowerCase().includes(search.value.toLowerCase()) ||
data.phone.includes(search.value)
){

result.innerHTML += `
<div class="result-card">
📅 ${data.date}<br>
👤 ${data.name}<br>
💰 Received: ₹${data.received}<br>
💸 Give Back: ₹${data.giveback}
</div>
`;

}

cursor.continue();
}

};

}

</script>

</body>

</html>
